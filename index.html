<script>
        document.querySelectorAll('[data-md]').forEach(function(el) {
            fetch(el.getAttribute('data-md'))
                .then(function(r) { return r.text(); })
                .then(function(text) { el.innerHTML = marked.parse(text); });
        });
    </script>

    <script>
        // Hamburger toggle
        document.getElementById('nav-toggle').addEventListener('click', function() {
            var links = document.getElementById('nav-links');
            var open = links.classList.toggle('open');
            this.setAttribute('aria-expanded', open);
        });

        // Close dropdown when a link is clicked
        document.querySelectorAll('.nav-links a').forEach(function(a) {
            a.addEventListener('click', function() {
                document.getElementById('nav-links').classList.remove('open');
                document.getElementById('nav-toggle').setAttribute('aria-expanded', false);
            });
        });

        // Update current section label
        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    var link = document.querySelector('.nav-links a[href="#' + entry.target.id + '"]');
                    if (link) document.getElementById('nav-current').textContent = link.textContent;
                }
            });
        }, { threshold: 0.3 });

        document.querySelectorAll('section[id]').forEach(function(s) { observer.observe(s); });

</script>
